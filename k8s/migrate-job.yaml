apiVersion: batch/v1
kind: Job
metadata:
  name: critical-path-migrate-{COMMITHASH}
  namespace: critical-path
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: us-west1-docker.pkg.dev/realm-construction/critical-path/api:{COMMITHASH}
          command: ['node', '--import', 'tsx', 'src/db/migrate.ts']
          env:
            - name: ENVIRONMENT
              value: production
            - name: DB_HOSTNAME
              value: 10.122.128.3
            - name: DB_PORT
              value: '5432'
            - name: DB_DATABASE
              value: critical_path
            - name: DB_USER
              value: critical_path
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: critical-path-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
