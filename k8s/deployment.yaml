apiVersion: apps/v1
kind: Deployment
metadata:
  name: critical-path-api
  namespace: critical-path
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: critical-path-api
  template:
    metadata:
      labels:
        app: critical-path-api
    spec:
      serviceAccountName: critical-path-api
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: critical-path-api
      containers:
        - name: api
          image: us-west1-docker.pkg.dev/realm-construction/critical-path/api:{COMMITHASH}
          ports:
            - containerPort: 3001
          env:
            - name: ENVIRONMENT
              value: production
            - name: PORT
              value: '3001'
            - name: DB_HOSTNAME
              value: 10.122.128.3
            - name: DB_PORT
              value: '5432'
            - name: DB_DATABASE
              value: critical_path
            - name: DB_USER
              value: critical_path
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: critical-path-secrets
                  key: DB_PASSWORD
            - name: PASSWORD_RESET_SECRET
              valueFrom:
                secretKeyRef:
                  name: critical-path-secrets
                  key: PASSWORD_RESET_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: critical-path-secrets
                  key: REDIS_URL
            - name: STORAGE_DRIVER
              value: gcs
            - name: STORAGE_GCS_BUCKET
              value: critical-path-uploads-prod
            - name: CORS_ORIGINS
              value: https://criticalpath.skylerberg.com
            - name: RESET_URL_BASE
              value: https://criticalpath.skylerberg.com/reset-password
            - name: TRUST_PROXY
              value: 'true'
            - name: TRUST_PROXY_HOPS
              value: '2'
            - name: EMAIL_DRIVER
              value: console
            - name: FEEDBACK_EMAIL_ADDRESS
              value: criticalpath@skylerberg.com
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 10
          # TCP, not /health: a database outage must not restart-loop the pod.
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          lifecycle:
            # Keep serving while the load balancer deprograms this endpoint
            # from the NEG; SIGTERM only arrives after the sleep.
            preStop:
              exec:
                command: ['sleep', '15']
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
