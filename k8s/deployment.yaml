apiVersion: apps/v1
kind: Deployment
metadata:
  name: critical-path-api
  namespace: critical-path
spec:
  # Single replica until the realtime bus, upload storage, and rate limits
  # are shared across processes; Recreate because the uploads PVC is RWO.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: critical-path-api
  template:
    metadata:
      labels:
        app: critical-path-api
    spec:
      terminationGracePeriodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: gcr.io/realm-construction/critical-path-api:{COMMITHASH}
          ports:
            - containerPort: 3001
          env:
            - name: ENVIRONMENT
              value: production
            - name: PORT
              value: '3001'
            - name: DB_HOSTNAME
              value: 10.122.128.3
            - name: DB_PORT
              value: '5432'
            - name: DB_DATABASE
              value: critical_path
            - name: DB_USER
              value: critical_path
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: critical-path-secrets
                  key: DB_PASSWORD
            - name: PASSWORD_RESET_SECRET
              valueFrom:
                secretKeyRef:
                  name: critical-path-secrets
                  key: PASSWORD_RESET_SECRET
            - name: STORAGE_DRIVER
              value: disk
            - name: STORAGE_DISK_ROOT
              value: /data/uploads
            - name: CORS_ORIGINS
              value: https://criticalpath.skylerberg.com
            - name: RESET_URL_BASE
              value: https://criticalpath.skylerberg.com/reset-password
            - name: TRUST_PROXY
              value: 'true'
            - name: TRUST_PROXY_HOPS
              value: '2'
            - name: EMAIL_DRIVER
              value: console
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 10
          # TCP, not /health: a database outage must not restart-loop the pod.
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: critical-path-uploads
